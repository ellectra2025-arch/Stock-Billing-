<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Stock Manager — Bill History</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --red: #E3000F; --red-light: #ff1a27; --yellow: #FFD100;
    --black: #0A0A0A; --white: #FFFFFF;
    --gray-50: #F8F8F8; --gray-100: #F0F0F0; --gray-200: #E0E0E0;
    --gray-400: #999; --gray-600: #555; --gray-800: #222;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--white); color: var(--black); min-height: 100vh; }

  /* Auth */
  #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: var(--black); position: fixed; inset: 0; z-index: 999; transition: opacity 0.4s; }
  #auth-screen.hidden { opacity: 0; pointer-events: none; }
  .auth-logos { display: flex; align-items: center; gap: 18px; margin-bottom: 40px; }
  .auth-logos img { height: 56px; object-fit: contain; }
  .auth-logos .x-sep { font-family: 'Orbitron', monospace; font-size: 22px; color: var(--yellow); font-weight: 900; }
  .auth-card { background: #141414; border: 1px solid #2a2a2a; border-radius: 16px; padding: 44px 40px; width: 360px; text-align: center; box-shadow: 0 0 60px rgba(227,0,15,0.12); }
  .auth-card h2 { font-family: 'Orbitron', monospace; font-size: 18px; color: var(--white); letter-spacing: 2px; margin-bottom: 8px; }
  .auth-card p { color: var(--gray-400); font-size: 13px; margin-bottom: 32px; }
  .auth-input { width: 100%; padding: 13px 16px; border: 1px solid #333; border-radius: 8px; background: #0e0e0e; color: var(--white); font-size: 14px; margin-bottom: 14px; outline: none; transition: border-color 0.2s; }
  .auth-input:focus { border-color: var(--red); }
  .btn-signin { width: 100%; padding: 14px; background: var(--red); color: var(--white); border: none; border-radius: 8px; font-family: 'Orbitron', monospace; font-size: 13px; letter-spacing: 1.5px; cursor: pointer; transition: background 0.2s; }
  .btn-signin:hover { background: var(--red-light); }
  .auth-err { color: var(--red); font-size: 12px; margin-top: 10px; min-height: 18px; }

  /* Nav */
  #app { display: none; flex-direction: column; min-height: 100vh; }
  #app.visible { display: flex; }
  .topnav { display: flex; align-items: center; gap: 20px; padding: 0 32px; height: 64px; background: var(--black); position: sticky; top: 0; z-index: 100; border-bottom: 2px solid var(--red); }
  .nav-logos { display: flex; align-items: center; gap: 10px; }
  .nav-logos img { height: 34px; object-fit: contain; }
  .nav-logos .x-sep { font-family: 'Orbitron', monospace; font-size: 14px; color: var(--yellow); font-weight: 900; }
  .nav-links { display: flex; gap: 4px; margin-left: auto; }
  .nav-link { padding: 8px 18px; border-radius: 6px; color: var(--gray-400); font-size: 13px; font-weight: 500; text-decoration: none; transition: all 0.18s; letter-spacing: 0.5px; }
  .nav-link:hover, .nav-link.active { background: var(--red); color: var(--white); }
  .nav-user { color: var(--gray-400); font-size: 12px; margin-left: 16px; }
  .btn-logout { padding: 7px 14px; border: 1px solid #444; border-radius: 6px; background: transparent; color: var(--gray-400); font-size: 12px; cursor: pointer; transition: all 0.18s; }
  .btn-logout:hover { border-color: var(--red); color: var(--red); }

  /* Layout */
  .page { padding: 40px 32px; max-width: 1200px; margin: 0 auto; width: 100%; }
  .page-title { font-family: 'Orbitron', monospace; font-size: 11px; letter-spacing: 3px; color: var(--red); text-transform: uppercase; margin-bottom: 6px; }
  .page-heading { font-family: 'Orbitron', monospace; font-size: 26px; color: var(--black); margin-bottom: 32px; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 32px; }
  .stat-card { background: var(--black); border-radius: 14px; padding: 28px 24px; position: relative; overflow: hidden; }
  .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .stat-card.red::before { background: var(--red); }
  .stat-card.yellow::before { background: var(--yellow); }
  .stat-card.white::before { background: var(--white); }
  .stat-label { font-size: 11px; letter-spacing: 2px; color: var(--gray-400); text-transform: uppercase; margin-bottom: 12px; }
  .stat-value { font-family: 'Orbitron', monospace; font-size: 32px; font-weight: 700; color: var(--white); }
  .stat-sub { font-size: 12px; color: var(--gray-600); margin-top: 6px; }

  /* Filters */
  .filters-card { background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: 14px; padding: 20px 24px; margin-bottom: 24px; }
  .filters-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 14px; align-items: end; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gray-600); font-weight: 600; }
  .form-input, .form-select { padding: 11px 14px; border: 1.5px solid var(--gray-200); border-radius: 8px; font-size: 13px; font-family: 'Inter', sans-serif; outline: none; background: var(--white); color: var(--black); transition: border-color 0.2s; width: 100%; }
  .form-input:focus, .form-select:focus { border-color: var(--red); }
  .btn-secondary { padding: 12px 20px; background: var(--black); color: var(--white); border: none; border-radius: 8px; font-family: 'Orbitron', monospace; font-size: 11px; letter-spacing: 1.5px; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
  .btn-secondary:hover { background: #333; }
  .btn-secondary:disabled { opacity: 0.4; cursor: default; }

  .results-count { font-size: 12px; color: var(--gray-600); margin-bottom: 14px; }

  /* Table */
  .tbl-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--gray-200); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { background: var(--black); color: var(--yellow); font-family: 'Orbitron', monospace; font-size: 10px; letter-spacing: 1.5px; padding: 14px 16px; text-align: left; white-space: nowrap; }
  tbody tr { border-bottom: 1px solid var(--gray-100); transition: background 0.15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--gray-50); }
  tbody td { padding: 13px 16px; color: var(--gray-800); }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 600; letter-spacing: 0.5px; }
  .badge-cat { background: #fff3cd; color: #856404; }
  .badge-pay { background: #e2e3ff; color: #383a8c; }
  .btn-view { padding: 7px 16px; background: var(--black); color: var(--white); border: none; border-radius: 6px; cursor: pointer; font-size: 11px; font-family: 'Orbitron', monospace; letter-spacing: 1px; transition: background 0.2s; }
  .btn-view:hover { background: var(--red); }

  .loader { text-align: center; padding: 40px; color: var(--gray-400); font-family: 'Orbitron', monospace; font-size: 11px; letter-spacing: 2px; }
  .load-more-wrap { text-align: center; margin-top: 24px; }

  /* ── PRINT BILL ── */
  #bill-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 900; overflow-y: auto; padding: 32px 16px; }
  #bill-modal.open { display: flex; flex-direction: column; align-items: center; }
  .bill-modal-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
  .btn-print { padding: 12px 28px; background: var(--black); color: var(--white); border: none; border-radius: 8px; font-family: 'Orbitron', monospace; font-size: 12px; letter-spacing: 1.5px; cursor: pointer; }
  .btn-close-bill { padding: 12px 20px; background: var(--red); color: var(--white); border: none; border-radius: 8px; font-size: 13px; cursor: pointer; }

  /* Bill Paper */
  #bill-paper { background: #fff; width: 794px; max-width: 100%; padding: 32px 36px; font-family: 'Times New Roman', Times, serif; font-size: 12px; color: #000; border-radius: 4px; }
  .bill-header-top { text-align: center; font-size: 16px; font-weight: bold; letter-spacing: 2px; padding: 8px 0; border-bottom: 2px solid #000; margin-bottom: 12px; }
  .bill-original { text-align: right; font-size: 10px; margin-bottom: 8px; color: #444; }
  .bill-co-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .bill-co-info { display: flex; align-items: center; gap: 12px; }
  .bill-co-logo { height: 56px; object-fit: contain; }
  .bill-co-name { font-size: 18px; font-weight: bold; }
  .bill-co-meta { font-size: 10px; color: #444; margin-top: 2px; }
  .bill-inv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border: 1px solid #000; }
  .bill-inv-row { display: flex; border-bottom: 1px solid #ccc; font-size: 11px; }
  .bill-inv-row:last-child { border-bottom: none; }
  .bill-inv-label { padding: 4px 8px; color: #555; min-width: 130px; border-right: 1px solid #ccc; }
  .bill-inv-val { padding: 4px 8px; font-weight: bold; }
  .bill-divider { border: none; border-top: 1.5px solid #000; margin: 12px 0; }
  .bill-section-head { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .bill-addr-box { font-size: 11px; }
  .bill-addr-title { font-size: 10px; letter-spacing: 1px; color: #666; margin-bottom: 4px; text-transform: uppercase; }
  .bill-addr-name { font-size: 13px; font-weight: bold; margin-bottom: 3px; }
  table.bill-items { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 0; }
  table.bill-items th { background: #f5f5f5; border: 1px solid #999; padding: 6px 8px; text-align: center; font-size: 10px; font-weight: bold; }
  table.bill-items td { border: 1px solid #ccc; padding: 6px 8px; vertical-align: top; }
  table.bill-items td.center { text-align: center; }
  table.bill-items td.right { text-align: right; }
  table.bill-items tr.total-row td { background: #f9f9f9; font-weight: bold; border-top: 2px solid #000; }
  .bill-tax-section { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border: 1px solid #999; margin-top: 12px; }
  .bill-words-box { padding: 10px; font-size: 11px; }
  .bill-words-title { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: #666; margin-bottom: 4px; }
  .bill-words-val { font-style: italic; font-weight: bold; font-size: 12px; }
  .bill-words-sub { font-size: 9px; color: #666; margin-top: 6px; }
  .bill-declaration { font-size: 9px; color: #555; margin-top: 10px; }
  table.bill-tax-tbl { width: 100%; border-collapse: collapse; font-size: 10px; border-left: 1px solid #999; }
  table.bill-tax-tbl th, table.bill-tax-tbl td { border: 1px solid #ccc; padding: 4px 6px; text-align: center; }
  table.bill-tax-tbl th { background: #f0f0f0; font-size: 9px; }
  .bill-footer { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 14px; border-top: 1px solid #999; padding-top: 12px; }
  .bill-bank { font-size: 10px; color: #444; }
  .bill-sign { text-align: right; font-size: 11px; }
  .bill-sign-company { font-size: 13px; font-weight: bold; margin-top: 4px; }
  .bill-sign-auth { margin-top: 40px; font-size: 10px; color: #555; }
  .bill-seal { font-size: 11px; font-weight: bold; border-top: 1px solid #999; padding-top: 8px; margin-top: 12px; }
  .bill-jurisdiction { text-align: center; border-top: 1px solid #999; margin-top: 12px; padding-top: 8px; font-size: 10px; letter-spacing: 1px; }

  @media print {
    body * { visibility: hidden !important; }
    #bill-paper, #bill-paper * { visibility: visible !important; }
    #bill-paper { position: fixed !important; inset: 0 !important; width: 100% !important; padding: 20px !important; box-shadow: none !important; margin: 0 !important; }
    #bill-modal { background: white !important; }
    .bill-modal-bar { display: none !important; }
  }

  @media (max-width: 900px) {
    .filters-grid { grid-template-columns: 1fr 1fr; }
    .topnav { padding: 0 16px; }
    .page { padding: 24px 16px; }
    .nav-user { display: none; }
  }
  @media (max-width: 560px) {
    .filters-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-logos">
    <img src="https://raw.githubusercontent.com/projectcentreai-ux/OM-Electronics/main/logo_om-removebg-preview.png" alt="OM" onerror="this.style.display='none'"/>
    <span class="x-sep">✕</span>
    <img src="https://raw.githubusercontent.com/ellectra2025-arch/ellectra-automation/main/Ellectra_w01wap%20(2)%20(1).png" alt="Ellectra" onerror="this.style.display='none'"/>
  </div>
  <div class="auth-card">
    <h2>STOCK MANAGER</h2>
    <p>Sign in to view bill history</p>
    <input class="auth-input" id="email-inp" type="email" placeholder="Email address"/>
    <input class="auth-input" id="pass-inp" type="password" placeholder="Password"/>
    <button class="btn-signin" id="signin-btn">SIGN IN</button>
    <div class="auth-err" id="auth-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <nav class="topnav">
    <div class="nav-logos">
      <img src="https://raw.githubusercontent.com/projectcentreai-ux/OM-Electronics/main/logo_om-removebg-preview.png" alt="OM" height="34" onerror="this.style.display='none'"/>
      <span class="x-sep">✕</span>
      <img src="https://raw.githubusercontent.com/ellectra2025-arch/ellectra-automation/main/Ellectra_w01wap%20(2)%20(1).png" alt="Ellectra" height="34" onerror="this.style.display='none'"/>
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Dashboard</a>
      <a href="add.html" class="nav-link">Stock</a>
      <a href="sale.html" class="nav-link">Sales</a>
      <a href="histbills.html" class="nav-link active">History</a>
    </div>
    <span class="nav-user" id="nav-user-email"></span>
    <button class="btn-logout" id="logout-btn">Sign Out</button>
  </nav>

  <main class="page">
    <div class="page-title">Records</div>
    <div class="page-heading">Bill History</div>

    <div class="stats-grid">
      <div class="stat-card red">
        <div class="stat-label">Total Bills</div>
        <div class="stat-value" id="stat-bills">0</div>
        <div class="stat-sub">Loaded invoices</div>
      </div>
      <div class="stat-card yellow">
        <div class="stat-label">Total Revenue</div>
        <div class="stat-value" id="stat-revenue">₹0</div>
        <div class="stat-sub">Across loaded bills</div>
      </div>
      <div class="stat-card white">
        <div class="stat-label">OM Robotics</div>
        <div class="stat-value" id="stat-om">₹0</div>
        <div class="stat-sub" id="stat-om-sub">0 bills</div>
      </div>
      <div class="stat-card red">
        <div class="stat-label">Ellectra</div>
        <div class="stat-value" id="stat-ellectra">₹0</div>
        <div class="stat-sub" id="stat-ellectra-sub">0 bills</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters-card">
      <div class="filters-grid">
        <div class="form-group">
          <label class="form-label">Search</label>
          <input class="form-input" id="f-search" placeholder="Invoice no, customer, phone…"/>
        </div>
        <div class="form-group">
          <label class="form-label">Company</label>
          <select class="form-select" id="f-company">
            <option value="">All Companies</option>
            <option value="om">OM ROBOTICS</option>
            <option value="ellectra">ELLECTRA AUTOMATION</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">From Date</label>
          <input class="form-input" id="f-from" type="date"/>
        </div>
        <div class="form-group">
          <label class="form-label">To Date</label>
          <input class="form-input" id="f-to" type="date"/>
        </div>
        <button class="btn-secondary" id="f-clear">CLEAR</button>
      </div>
    </div>

    <div class="results-count" id="results-count"></div>

    <!-- Bills Table -->
    <div class="tbl-wrap" id="bills-wrap">
      <div class="loader" id="bills-loader">LOADING…</div>
      <table id="bills-table" style="display:none">
        <thead>
          <tr>
            <th>Invoice No.</th>
            <th>Date</th>
            <th>Customer</th>
            <th>Phone</th>
            <th>Company</th>
            <th>Payment</th>
            <th>Items</th>
            <th>Amount</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="bills-tbody"></tbody>
      </table>
    </div>

    <div class="load-more-wrap">
      <button class="btn-secondary" id="load-more-btn" style="display:none">LOAD MORE</button>
    </div>
  </main>
</div>

<!-- BILL MODAL -->
<div id="bill-modal">
  <div class="bill-modal-bar">
    <button class="btn-print" onclick="window.print()">🖨 PRINT BILL</button>
    <button class="btn-close-bill" onclick="closeBill()">✕ CLOSE</button>
  </div>
  <div id="bill-paper">
    <!-- dynamically rendered -->
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, query, orderBy, limit, startAfter }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAiabWKiwA9eP5DHn68Y1ZZtDKHt2ZjDZQ",
  authDomain: "stock-listing-bb1f6.firebaseapp.com",
  projectId: "stock-listing-bb1f6",
  storageBucket: "stock-listing-bb1f6.firebasestorage.app",
  messagingSenderId: "358845608088",
  appId: "1:358845608088:web:5d47e6e3e22329859160ed"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const PAGE_SIZE = 50;
let allBills = [];
let lastDoc = null;
let hasMore = true;

const companies = {
  om: { name: 'OM ROBOTICS', logo: 'https://raw.githubusercontent.com/projectcentreai-ux/OM-Electronics/main/logo_om-removebg-preview.png', gstin: '—', state: 'Tamil Nadu', prefix: 'IE' },
  ellectra: { name: 'ELLECTRA AUTOMATION', logo: 'https://raw.githubusercontent.com/ellectra2025-arch/ellectra-automation/main/Ellectra_w01wap%20(2)%20(1).png', gstin: '—', state: 'Tamil Nadu', prefix: 'EL' }
};

// --- Auth ---
document.getElementById('signin-btn').onclick = async () => {
  const email = document.getElementById('email-inp').value.trim();
  const pass = document.getElementById('pass-inp').value;
  const errEl = document.getElementById('auth-err');
  errEl.textContent = '';
  try { await signInWithEmailAndPassword(auth, email, pass); }
  catch(e) { errEl.textContent = e.message.replace('Firebase: ','').replace(/\(.*\)/,''); }
};
document.getElementById('pass-inp').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('signin-btn').click(); });
document.getElementById('logout-btn').onclick = () => signOut(auth);

onAuthStateChanged(auth, async user => {
  if(user) {
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    document.getElementById('nav-user-email').textContent = user.email;
    await loadBills(true);
  } else {
    document.getElementById('auth-screen').classList.remove('hidden');
    document.getElementById('app').classList.remove('visible');
  }
});

// --- Load bills (paginated) ---
async function loadBills(initial = false) {
  const loadBtn = document.getElementById('load-more-btn');
  try {
    let q;
    if(lastDoc) {
      q = query(collection(db,'sales'), orderBy('createdAt','desc'), startAfter(lastDoc), limit(PAGE_SIZE));
    } else {
      q = query(collection(db,'sales'), orderBy('createdAt','desc'), limit(PAGE_SIZE));
    }
    const snap = await getDocs(q);
    snap.forEach(doc => allBills.push({ id: doc.id, ...doc.data() }));
    if(!snap.empty) lastDoc = snap.docs[snap.docs.length - 1];
    hasMore = snap.docs.length === PAGE_SIZE;
    loadBtn.style.display = hasMore ? '' : 'none';

    document.getElementById('bills-loader').style.display = 'none';
    document.getElementById('bills-table').style.display = '';
    renderStats();
    renderTable();
  } catch(e) {
    document.getElementById('bills-loader').textContent = 'Failed to load bills.';
    console.error(e);
  }
}

document.getElementById('load-more-btn').onclick = async (e) => {
  e.target.textContent = 'LOADING…';
  e.target.disabled = true;
  await loadBills();
  e.target.textContent = 'LOAD MORE';
  e.target.disabled = false;
};

// --- Stats (over loaded bills) ---
function renderStats() {
  let total = 0, omTotal = 0, omCount = 0, elTotal = 0, elCount = 0;
  allBills.forEach(b => {
    total += (b.total || 0);
    const key = b.companyKey || ((b.company||'').toLowerCase().includes('ellectra') ? 'ellectra' : 'om');
    if(key === 'ellectra') { elTotal += (b.total||0); elCount++; }
    else { omTotal += (b.total||0); omCount++; }
  });
  document.getElementById('stat-bills').textContent = allBills.length;
  document.getElementById('stat-revenue').textContent = '₹' + total.toLocaleString('en-IN');
  document.getElementById('stat-om').textContent = '₹' + omTotal.toLocaleString('en-IN');
  document.getElementById('stat-om-sub').textContent = omCount + ' bill(s)';
  document.getElementById('stat-ellectra').textContent = '₹' + elTotal.toLocaleString('en-IN');
  document.getElementById('stat-ellectra-sub').textContent = elCount + ' bill(s)';
}

// --- Filtering ---
function getFiltered() {
  const search = document.getElementById('f-search').value.trim().toLowerCase();
  const company = document.getElementById('f-company').value;
  const from = document.getElementById('f-from').value;
  const to = document.getElementById('f-to').value;

  return allBills.filter(b => {
    if(search) {
      const hay = `${b.invoiceNo||''} ${b.customerName||''} ${b.customerPhone||''}`.toLowerCase();
      if(!hay.includes(search)) return false;
    }
    if(company) {
      const key = b.companyKey || ((b.company||'').toLowerCase().includes('ellectra') ? 'ellectra' : 'om');
      if(key !== company) return false;
    }
    if(from || to) {
      const d = b.date ? new Date(b.date) : (b.createdAt?.toDate ? b.createdAt.toDate() : null);
      if(!d) return false;
      const dStr = d.toISOString().slice(0,10);
      if(from && dStr < from) return false;
      if(to && dStr > to) return false;
    }
    return true;
  });
}

function renderTable() {
  const tbody = document.getElementById('bills-tbody');
  const filtered = getFiltered();
  document.getElementById('results-count').textContent =
    `Showing ${filtered.length} of ${allBills.length} loaded bill(s)`;

  if(!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:40px;color:#999">No bills match these filters.</td></tr>';
    return;
  }

  // sort by date desc within filtered set
  const sorted = [...filtered].sort((a,b) => {
    const da = a.createdAt?.toDate ? a.createdAt.toDate() : new Date(a.date || 0);
    const db_ = b.createdAt?.toDate ? b.createdAt.toDate() : new Date(b.date || 0);
    return db_ - da;
  });

  tbody.innerHTML = sorted.map(b => {
    const date = b.createdAt?.toDate ? b.createdAt.toDate() : (b.date ? new Date(b.date) : new Date());
    return `
      <tr>
        <td style="font-family:monospace;font-weight:700">${b.invoiceNo||'-'}</td>
        <td style="color:#888">${date.toLocaleDateString('en-IN')}</td>
        <td style="font-weight:600">${b.customerName||'-'}</td>
        <td style="color:#888">${b.customerPhone||'-'}</td>
        <td><span class="badge badge-cat">${b.company||'-'}</span></td>
        <td><span class="badge badge-pay">${b.paymentMode||'-'}</span></td>
        <td>${(b.items||[]).length} item(s)</td>
        <td style="font-weight:700;color:var(--red)">₹${(b.total||0).toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2})}</td>
        <td><button class="btn-view" onclick="viewBill('${b.id}')">VIEW / PRINT</button></td>
      </tr>`;
  }).join('');
}

['f-search','f-company','f-from','f-to'].forEach(id => {
  document.getElementById(id).addEventListener('input', renderTable);
  document.getElementById(id).addEventListener('change', renderTable);
});
document.getElementById('f-clear').onclick = () => {
  document.getElementById('f-search').value = '';
  document.getElementById('f-company').value = '';
  document.getElementById('f-from').value = '';
  document.getElementById('f-to').value = '';
  renderTable();
};

// --- View / Reprint Bill ---
window.viewBill = (id) => {
  const b = allBills.find(x => x.id === id);
  if(!b) return;
  renderBill(b);
};
window.closeBill = () => document.getElementById('bill-modal').classList.remove('open');

function numberToWords(n) {
  const ones = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten',
    'Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const tens = ['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  if(n===0) return 'Zero';
  n = Math.round(n);
  function below100(n) { return n<20?ones[n]:(tens[Math.floor(n/10)]+(n%10?' '+ones[n%10]:'')); }
  function below1000(n) { return n>=100?(ones[Math.floor(n/100)]+' Hundred'+(n%100?' '+below100(n%100):'')):(below100(n)); }
  let result='', crore=Math.floor(n/10000000); n%=10000000;
  let lakh=Math.floor(n/100000); n%=100000;
  let thou=Math.floor(n/1000); n%=1000;
  let hund=Math.floor(n/100); n%=100;
  if(crore) result+=below100(crore)+' Crore ';
  if(lakh) result+=below100(lakh)+' Lakh ';
  if(thou) result+=below1000(thou)+' Thousand ';
  if(hund) result+=ones[hund]+' Hundred ';
  if(n) result+=below100(n);
  return result.trim();
}

function renderBill(s) {
  const co = companies[s.companyKey || (s.company?.toLowerCase().includes('ellectra')?'ellectra':'om')];
  const date = s.date ? new Date(s.date) : (s.createdAt?.toDate ? s.createdAt.toDate() : new Date());
  const dateStr = date.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
  const amtWords = 'INR ' + numberToWords(Math.floor(s.total||0)) + ' Only';
  const taxWords = 'INR ' + numberToWords(Math.floor((s.cgstAmount||0)+(s.sgstAmount||0))) + ' Only';
  const fmt = v => '₹' + (v||0).toLocaleString('en-IN', {minimumFractionDigits:2,maximumFractionDigits:2});

  const itemRows = (s.items||[]).map((item,i) => {
    const full = (item.qty||1)*(item.price||0);
    const disc = full*(item.disc||0)/100;
    const amt = full - disc;
    return `<tr>
      <td class="center">${i+1}</td>
      <td>${item.name||'-'}</td>
      <td class="center">${item.hsn||'—'}</td>
      <td class="center">${item.qty||1} ${item.unit||'NOS'}</td>
      <td class="right">₹${(item.price||0).toLocaleString('en-IN')}</td>
      <td class="center">${item.unit||'NOS'}</td>
      <td class="center">${item.disc||0}%</td>
      <td class="right">${fmt(amt)}</td>
    </tr>`;
  }).join('');

  const taxRows = (s.items||[]).map(item => {
    const full = (item.qty||1)*(item.price||0);
    const taxable = full*(1-(item.disc||0)/100);
    const cgstAmt = taxable*(s.cgstRate||0)/100;
    const sgstAmt = taxable*(s.sgstRate||0)/100;
    return `<tr>
      <td>${item.hsn||'—'}</td>
      <td>${fmt(taxable)}</td>
      <td class="center">${s.cgstRate||0}%</td><td class="right">${fmt(cgstAmt)}</td>
      <td class="center">${s.sgstRate||0}%</td><td class="right">${fmt(sgstAmt)}</td>
      <td class="right">${fmt(cgstAmt+sgstAmt)}</td>
    </tr>`;
  }).join('');

  document.getElementById('bill-paper').innerHTML = `
    <div class="bill-header-top">TAX INVOICE</div>
    <div class="bill-original">(ORIGINAL FOR RECIPIENT)</div>

    <div class="bill-co-row">
      <div class="bill-co-info">
        <img class="bill-co-logo" src="${co.logo}" alt="${co.name}" onerror="this.style.display='none'"/>
        <div>
          <div class="bill-co-name">${co.name}</div>
          <div class="bill-co-meta">GSTIN/UIN: ${co.gstin}</div>
          <div class="bill-co-meta">State: ${co.state}</div>
        </div>
      </div>
      <div style="min-width:240px">
        <div class="bill-inv-grid">
          <div class="bill-inv-row"><span class="bill-inv-label">Invoice No.</span><span class="bill-inv-val">${s.invoiceNo||'—'}</span></div>
          <div class="bill-inv-row"><span class="bill-inv-label">Dated</span><span class="bill-inv-val">${dateStr}</span></div>
          <div class="bill-inv-row"><span class="bill-inv-label">Delivery Note</span><span class="bill-inv-val">—</span></div>
          <div class="bill-inv-row"><span class="bill-inv-label">Mode/Terms of Payment</span><span class="bill-inv-val">${s.paymentMode||'CASH'}</span></div>
          <div class="bill-inv-row"><span class="bill-inv-label">Reference No. &amp; Date</span><span class="bill-inv-val">—</span></div>
          <div class="bill-inv-row"><span class="bill-inv-label">Other References</span><span class="bill-inv-val">—</span></div>
        </div>
      </div>
    </div>

    <div class="bill-divider"></div>

    <div class="bill-section-head">
      <div class="bill-addr-box">
        <div class="bill-addr-title">Buyer (Bill To)</div>
        <div class="bill-addr-name">${s.customerName||'Customer Name'}</div>
        <div>${s.customerAddress||'—'}</div>
        <div>State Name: ${s.customerState||'—'}</div>
        <div>Contact: ${s.customerPhone||'—'}</div>
        <div>GSTIN/UIN: ${s.customerGstin||'—'}</div>
      </div>
      <div class="bill-addr-box">
        <div class="bill-addr-title">Dispatch / Delivery Details</div>
        <div style="display:flex;justify-content:space-between"><span>Dispatched through</span><b>${s.dispatchMode||'SELF'}</b></div>
        <div style="display:flex;justify-content:space-between"><span>Destination</span><b>—</b></div>
        <div style="display:flex;justify-content:space-between"><span>Bill of Lading/LR-RR No.</span><b>—</b></div>
        <div style="display:flex;justify-content:space-between"><span>Motor Vehicle No.</span><b>—</b></div>
        <div style="display:flex;justify-content:space-between"><span>Terms of Delivery</span><b>—</b></div>
      </div>
    </div>

    <div class="bill-divider"></div>

    <table class="bill-items">
      <thead>
        <tr>
          <th style="width:30px">SL<br>NO.</th>
          <th style="text-align:left">DESCRIPTION OF GOODS</th>
          <th>HSN/SAC</th>
          <th>QUANTITY</th>
          <th>RATE</th>
          <th>PER</th>
          <th>DISC.%</th>
          <th>AMOUNT</th>
        </tr>
      </thead>
      <tbody>
        ${itemRows}
        <tr>
          <td colspan="2"><b>Output CGST ${s.cgstRate||0}%</b></td>
          <td colspan="5"></td>
          <td class="right"><b>${fmt(s.cgstAmount||0)}</b></td>
        </tr>
        <tr>
          <td colspan="2"><b>Output SGST ${s.sgstRate||0}%</b></td>
          <td colspan="5"></td>
          <td class="right"><b>${fmt(s.sgstAmount||0)}</b></td>
        </tr>
        <tr class="total-row">
          <td colspan="2"><b>Total</b></td>
          <td></td>
          <td class="center"><b>${(s.items||[]).reduce((a,c)=>a+(c.qty||1),0)} NOS</b></td>
          <td colspan="3"></td>
          <td class="right"><b>${fmt(s.total||0)}</b></td>
        </tr>
      </tbody>
    </table>

    <div class="bill-tax-section">
      <div class="bill-words-box">
        <div class="bill-words-title">Amount Chargeable (in Words)</div>
        <div class="bill-words-val">${amtWords}</div>
        <div class="bill-words-sub">HSN/SAC: ${(s.items||[]).map(i=>i.hsn||'—').join(', ')}</div>
        <div class="bill-words-title" style="margin-top:10px">Tax Amount (in Words)</div>
        <div class="bill-words-val">${taxWords}</div>
        <div class="bill-declaration">
          <b>Declaration</b><br>
          We declare that this invoice shows the actual price of the goods described and that all particulars are true and correct.
        </div>
      </div>
      <table class="bill-tax-tbl">
        <thead>
          <tr><th rowspan="2">HSN/<br>SAC</th><th rowspan="2">Taxable<br>Value</th><th colspan="2">CGST</th><th colspan="2">SGST/UTGST</th><th rowspan="2">Total<br>Tax<br>Amt</th></tr>
          <tr><th>Rate</th><th>Amt</th><th>Rate</th><th>Amt</th></tr>
        </thead>
        <tbody>
          ${taxRows}
          <tr>
            <td><b>Total</b></td>
            <td><b>${fmt(s.taxable||0)}</b></td>
            <td>—</td><td><b>${fmt(s.cgstAmount||0)}</b></td>
            <td>—</td><td><b>${fmt(s.sgstAmount||0)}</b></td>
            <td><b>${fmt((s.cgstAmount||0)+(s.sgstAmount||0))}</b></td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="bill-footer">
      <div class="bill-bank">
        <div style="font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#666;margin-bottom:4px">Company's Bank Details</div>
        <div>—</div>
      </div>
      <div class="bill-sign">
        <div style="font-size:10px;color:#666">for</div>
        <div class="bill-sign-company">${co.name}</div>
        <div class="bill-sign-auth">Authorised Signatory</div>
      </div>
    </div>
    <div class="bill-seal"><b>Customer's Seal and Signature</b></div>
    <div class="bill-jurisdiction">SUBJECT TO CHENNAI JURISDICTION &nbsp;|&nbsp; This is a Computer Generated Invoice</div>
  `;

  document.getElementById('bill-modal').classList.add('open');
}
</script>
</body>
</html>
